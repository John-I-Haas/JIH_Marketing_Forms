<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - BetaTec</title>
  <link rel="stylesheet" href="../forms.css">
</head>

<body>

  This is a test of the html to be embedded in the BetaTec website. The form submits to Salesforce and creates a Lead.

  <div class="form-wrapper">

    <form action="https://test.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&amp;orgId=00D9M00000Ki5V8"
      method="POST">

      <input type="hidden" name="oid" value="00D9M00000Ki5V8">
      <!-- retUR: Where will the user be redirected after submission -->
      <input type="hidden" name="retURL" value="https://jih-marketing-forms.vercel.app/thankyou.html">
      <!--  Debug fields (uncomment to test, you will get an email if a submission failed.) 
      <input type="hidden" name="debug" value="1">
      <input type="hidden" name="debugEmail" value="ruben.cervantes@johnihaas.com">
      -->
      

      <ul class="form_fields">

        <li>
          <label for="first_name">First Name</label>
          <input id="first_name" maxlength="40" name="first_name" type="text" placeholder="First Name">
        </li>

        <li>
          <label for="last_name">Last Name</label>
          <input id="last_name" maxlength="80" name="last_name" type="text" placeholder="Last Name" required>
        </li>

        <li class="full-width">
          <label for="email">Email</label>
          <input id="email" maxlength="80" name="email" type="email" placeholder="Email" required>
        </li>

        <li>
          <label for="company">Company</label>
          <input id="company" maxlength="40" name="company" type="text" placeholder="Company">
        </li>

        <li>
          <label for="phone">Phone</label>
          <input id="phone" maxlength="40" name="phone" type="tel" placeholder="Phone">
        </li>

        <li>
          <label for="country_code">Country</label>
          <div class="select-wrapper">
            <select id="country_code" name="country_code">
              <option value="">Country</option>
              <option value="AE">United Arab Emirates</option>
              <option value="GB">United Kingdom</option>
              <option value="US">United States</option>
              <option value="MX">Mexico</option>
              <option value="CA">Canada</option>
              <option value="AU">Australia</option>
              <option value="DE">Germany</option>
              <option value="GB">United Kingdom</option>
            </select>
          </div>
        </li>

        <!--
        <label for="country">Country (text only)</label><input  id="country" maxlength="40" name="country" size="20" type="text" /><br>
        <label for="state">State/Province (text only)</label>
        <input  id="state" maxlength="20" name="state" size="20" type="text" />
        -->

        <li>
          <label for="00N2p0000096ZVY">Position</label>
          <div class="select-wrapper">
            <select id="00N2p0000096ZVY" name="00N2p0000096ZVY" title="Position" data-field="position">
              <option value="">Position</option>
              <option value="Purchasing">Purchasing</option>
              <option value="Lab">Lab</option>
              <option value="Sales">Sales</option>
              <option value="Marketing">Marketing</option>
              <option value="Plant Manager">Plant Manager</option>
              <option value="Production">Production</option>
              <option value="R&amp;D">R&D</option>
              <option value="Finance">Finance</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </li>

        <li>
          <label for="state">State/Province</label>
          <input  id="state" maxlength="20" name="state" size="20" type="text" placeholder="State/Province"/>
        </li>

        <li>
          <label for="industry">Industry</label>
          <div class="select-wrapper">
            <select id="industry" name="industry">
              <option value="">--- Select Industry ---</option>
              <option value="Sugar">Sugar Production</option>
              <option value="Yeast">Yeast Production</option>
              <option value="Spirits">Spirits</option>

              <option value="Biofuels">Biofuels Production</option>
              <option value="Food ShelfLife">Food Shelf-Life Extender</option>
              <option value="Feed Supplements">Feed Supplements</option>
              <option value="Nutraceutical">Nutraceutical Ingredients</option>
              <option value="Crop Protection">Crop Protection</option>
              <option value="Whey Protein">Whey Protein Production</option>
              <option value="Drilling Fluids">Drilling Fluids</option>
              <option value="Agriculture Bio-Simulants">Agriculture Bio-Simulants</option>

              <option value="Others">Your Custom Application</option>
            </select>
          </div>
        </li>


        <li class="full-width">
          <label for="description">Description</label>
          <textarea id="description" name="description" placeholder="Message"></textarea>
        </li>

        <li class="full-width checkbox-field">
          <div class="checkbox-option">
            <input type="checkbox" id="data-consent" name="00N9M00000Xl7Pd" value="1" required data-field="data_consent_lead">
            <label for="data-consent" class="checkbox-label">I have read and agree to the BetaTec <a href="https://betatec.com/privacy" target="_blank">Privacy Policy</a>. *</label>
          </div>
        </li>

        <li class="full-width checkbox-field">
          <div class="checkbox-option">
            <input type="checkbox" id="newsletter-consent" name="00N9M00000Xl7EL" value="1" data-field="newsletter_consent_lead">
            <label for="newsletter-consent" class="checkbox-label">Yes, I want to receive marketing emails from BetaTec, including newsletters, product updates, and other important information. I understand that I can revoke this consent at any time.</label>
          </div>
        </li>

      </ul>

      <input type="hidden" id="lead_source" name="lead_source" value="Website BHP">

      <div class="form-submit">
        <input type="submit" name="submit" value="Let's Talk Hops">
      </div>

    </form>
  </div>

</body>

</html>
