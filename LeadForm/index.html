<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - John I. Haas</title>
  <link rel="stylesheet" href="../forms.css">
  <script src="../forms.js"></script>
</head>

<body>

  <div class="form-wrapper">

    <form action="https://test.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&amp;orgId=00D9M00000Ki5V8"
      method="POST">

      <input type="hidden" name="oid" value="00D9M00000Ki5V8">
      <!-- retURL must be an absolute URL when deployed — update to match the hosted domain -->
      <input type="hidden" name="retURL" value="https://jih-marketing-forms.vercel.app/thankyou.html">
      <!--<input type="hidden" name="Campaign_ID" value="7019M00001TBlpMQAT">-->
      <!-- JIH_Campaign__c -->
      <input type="hidden" id="00N9M00000XtQID" maxlength="255" name="00N9M00000XtQID" size="20" type="text" />

      <!--  Debug fields (uncomment to test) -->
      <input type="hidden" name="debug" value="1">
      <input type="hidden" name="debugEmail" value="ruben.cervantes@johnihaas.com">
      

      <ul class="form_fields">

        <li>
          <label for="first_name">First Name</label>
          <input id="first_name" maxlength="40" name="first_name" type="text" placeholder="First Name">
        </li>

        <li>
          <label for="last_name">Last Name</label>
          <input id="last_name" maxlength="80" name="last_name" type="text" placeholder="Last Name" required>
        </li>

        <li class="full-width">
          <label for="email">Email</label>
          <input id="email" maxlength="80" name="email" type="email" placeholder="Email" required>
        </li>

        <li>
          <label for="company">Company</label>
          <input id="company" maxlength="40" name="company" type="text" placeholder="Company">
        </li>


        <li>
          <label for="00N2p000009T9yk">Customer tier</label>
          <div class="select-wrapper">
            <select id="00N2p000009T9yk" name="00N2p000009T9yk" title="Customer tier">
              <option value="">Less than 1,000 Barrels</option>
              <option value="TIER 1">1,000 - 5,000 Barrels</option>
              <option value="TIER 2">5,000 - 30,000 Barrels</option>
              <option value="TIER 3">30,000 - 100,000 Barrels</option>
              <option value="TIER 4">More than 100,000 Barrels</option>
            </select>
          </div>
        </li>

        <li>
          <label for="phone">Phone</label>
          <input id="phone" maxlength="40" name="phone" type="tel" placeholder="Phone">
        </li>

        <li>
          <label for="country_code">Country</label>
          <div class="select-wrapper">
            <select id="country_code" name="country_code">
              <option value="">Country</option>
              <option value="AE">United Arab Emirates</option>
              <option value="GB">United Kingdom</option>
              <option value="US">United States</option>
              <option value="MX">Mexico</option>
              <option value="CA">Canada</option>
              <option value="AU">Australia</option>
              <option value="DE">Germany</option>
              <option value="GB">United Kingdom</option>
            </select>
          </div>
        </li>

        <li>
          <label for="00N2p0000096ZVY">Position</label>
          <div class="select-wrapper">
            <select id="00N2p0000096ZVY" name="00N2p0000096ZVY" title="Position">
              <option value="">Position</option>
              <option value="Brewing">Brewer / Head Brewer / Brewmaster</option>
              <option value="Purchasing">Purchasing / Supply Chain</option>
              <option value="Owner">Owner / Founder</option>
              <option value="Operations">Operations</option>
              <option value="Quality Assurance">Quality Manager</option>
              <option value="Technical Manager">Technical Manager</option>
              <option value="Product Development">Product Development</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </li>

        <li>
          <label for="industry">Industry</label>
          <div class="select-wrapper">
            <select id="industry" name="industry">
              <option value="">--- Select Industry ---</option>
              <option value="Brewery">Brewery</option>
              <option value="Flavor House">Flavor House</option>
              <option value="Food">Food</option>
              <option value="Beverage">Beverage</option>
              <option value="Pharma & Health">Pharma &amp; Health</option>
              <option value="Scent & Care">Scent &amp; Care</option>
              <option value="Press">Press</option>
              <option value="Homebrewer">Homebrewer</option>
            </select>
          </div>
        </li>



        <li class="full-width">
          <label for="description">Description</label>
          <textarea id="description" name="description" placeholder="Message"></textarea>
        </li>

        <li class="full-width checkbox-field">
          <div class="checkbox-option">
            <input type="checkbox" id="data-consent" name="00N9M00000Xl7Pd" value="1" required>
            <label for="data-consent" class="checkbox-label">I have read and agree to the John I. Haas <a href="https://www.johnihaas.com/privacy-policy/" target="_blank">Privacy Policy</a>. *</label>
          </div>
        </li>

        <li class="full-width checkbox-field">
          <div class="checkbox-option">
            <input type="checkbox" id="newsletter-consent" name="00N9M00000Xl7EL" value="1">
            <label for="newsletter-consent" class="checkbox-label">Yes, I want to receive marketing emails from John I. Haas, including newsletters, product updates, and other important information. I understand that I can revoke this consent at any time.</label>
          </div>
        </li>

      </ul>

      <!-- Hidden fields populated by JS — valid lead_source values: JIH Marketing Forms, YVH, Webshop, Website signups, Marketing, Customer portal, CBC Attendee -->
      <input type="hidden" id="lead_source" name="lead_source" value="JIH Marketing Forms">
      <!-- Lead Source Detail: free-text companion to lead_source, set by JS -->
      <input type="hidden" id="00N2p0000097UMz" name="00N2p0000097UMz" value="">

      <div class="form-submit">
        <input type="submit" name="submit" value="Let's Talk Hops">
      </div>

    </form>
  </div>

</body>

</html>
