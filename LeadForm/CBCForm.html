<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - John I. Haas</title>
  <link rel="stylesheet" href="../forms.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>

<body>

  <div class="form-wrapper">
    <h1>CBC Lead</h1>

    <form action="https://test.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&amp;orgId=00D9M00000Ki5V8" method="POST">

      <input type="hidden" name="oid" value="00D9M00000Ki5V8">
      <input type="hidden" name="retURL" value="https://jih-marketing-forms.vercel.app/thankyou.html">
      <input type="hidden" id="00NVi000007HdYn" name="00NVi000007HdYn" type="checkbox" value="1" /><br>

      <!--  Debug fields (uncomment to test)
      <input type="hidden" name="debug" value="1">
      <input type="hidden" name="debugEmail" value="ruben.cervantes@johnihaas.com">
      -->

      <ul class="form_fields">

        <li>
          <label for="first_name">First Name</label>
          <input id="first_name" maxlength="40" name="first_name" type="text" placeholder="First Name">
        </li>

        <li>
          <label for="last_name">Last Name</label>
          <input id="last_name" maxlength="80" name="last_name" type="text" placeholder="Last Name">
        </li>

        <li class="full-width">
          <label for="email">Email</label>
          <input id="email" maxlength="80" name="email" type="email" placeholder="Email">
        </li>

        <li>
          <label for="company">Company</label>
          <input id="company" maxlength="40" name="company" type="text" placeholder="Company">
        </li>
        <li>
          <label for="rating">Rating</label>
          <div class="select-wrapper">
            <select id="rating" name="rating">
              <option value="">-- Select Rating --</option>
              <option value="Hot">Hot</option>
              <option value="Warm">Warm</option>
              <option value="Cold">Cold</option>
            </select>
          </div>
        </li>

        <li>
          <label for="00N2p000009T9yk">Customer tier</label>
          <div class="select-wrapper">
            <select id="00N2p000009T9yk" name="00N2p000009T9yk" title="Customer tier">
              <option value="">Less than 1,000 Barrels</option>
              <option value="TIER 1">1,000 - 5,000 Barrels</option>
              <option value="TIER 2">5,000 - 30,000 Barrels</option>
              <option value="TIER 3">30,000 - 100,000 Barrels</option>
              <option value="TIER 4">More than 100,000 Barrels</option>
            </select>
          </div>
        </li>

        <input type="hidden" name="lead_source" value="CBC Attendee">

        <!-- Show More toggle -->
        <li class="full-width">
          <button type="button" class="show-more-toggle" id="show-more-btn">
            <span class="toggle-icon">▶</span> Show More Fields
          </button>
        </li>

        <!-- Extra fields (hidden by default)
        <li class="extra-field">
          <label for="00N2p0000095tEh">Academic Title</label>
          <input id="00N2p0000095tEh" name="00N2p0000095tEh" maxlength="255" type="text" placeholder="Academic Title">
        </li>
         -->

        <li class="extra-field">
          <label for="00N2p0000096ZVY">Position</label>
          <div class="select-wrapper">
            <select id="00N2p0000096ZVY" name="00N2p0000096ZVY" title="Position">
              <option value="">Position</option>
              <option value="Brewing">Brewer / Brew master</option>
              <option value="Direct">Direct</option>
              <option value="Homebrewer">Homebrewer</option>
              <option value="Hopfenmeister">Hop master</option>
              <option value="Logistics">Logistics</option>
              <option value="Managing Director">Managing Director</option>
              <option value="Marketing">Marketing</option>
              <option value="Other">Other</option>
              <option value="Owner">Owner</option>
              <option value="Product Development">Product development</option>
              <option value="Purchasing">Purchasing</option>
              <option value="Quality Assurance">Quality assurance</option>
              <option value="Sales">Sales</option>
              <option value="Student">Student</option>
              <option value="Technical Manager">Technical</option>
            </select>
          </div>
        </li>

        <li class="extra-field">
          <label for="phone">Phone</label>
          <input id="phone" maxlength="40" name="phone" type="tel" placeholder="Phone">
        </li>

        <li class="extra-field">
          <label for="mobile">Mobile</label>
          <input id="mobile" maxlength="40" name="mobile" type="tel" placeholder="Mobile">
        </li>

        <li class="extra-field">
          <label for="fax">Fax</label>
          <input id="fax" maxlength="40" name="fax" type="tel" placeholder="Fax">
        </li>

        <li class="extra-field">
          <label for="url">Website</label>
          <input id="url" maxlength="80" name="url" type="text" placeholder="Website">
        </li>

        <li class="extra-field full-width">
          <label for="street">Street</label>
          <input type="text" id="street" name="street" placeholder="Street"></input>
        </li>

        <!--
        <li class="extra-field">
          <label for="00N2p000009T9yb">Address 2</label>
          <input id="00N2p000009T9yb" maxlength="50" name="00N2p000009T9yb" type="text" placeholder="Address 2">
        </li>
        -->

        <li class="extra-field">
          <label for="city">City</label>
          <input id="city" maxlength="40" name="city" type="text" placeholder="City">
        </li>

        <li class="extra-field">
          <label for="zip">Zip</label>
          <input id="zip" maxlength="20" name="zip" type="text" placeholder="Zip">
        </li>

        <li class="extra-field">
          <label for="state">State / Province</label>
          <input id="state" maxlength="20" name="state" type="text" placeholder="State / Province">
        </li>

        <li class="extra-field">
          <label for="country">Country</label>
          <input id="country" maxlength="40" name="country" type="text" placeholder="Country">
        </li>

        <!-- Rich Notes — Salesforce Rich Text Area field (verify field ID before deploying).
             Quill writes HTML into the hidden input on submit. -->
        <li class="full-width">
          <label>Rich Notes</label>
          <input type="hidden" id="00N9M00000XXX2DUAX" name="00N9M00000XXX2DUAX">
          <div id="quill-editor"></div>
        </li>

      </ul>

      <div class="form-submit">
        <input type="submit" name="submit" value="Let's Talk Hops">
        <input type="submit" value="Scan Business Card">
      </div>

    </form>
  </div>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script>
    var quill = new Quill('#quill-editor', {
      theme: 'snow',
      placeholder: 'Rich Notes',
      modules: {
        toolbar: [
          [{ header: [1, 2, 3, 4, false] }],
          [{ font: [] }, { size: ['small', false, 'large', 'huge'] }],
          ['bold', 'italic', 'underline', 'strike'],
          [{ color: [] }, { background: [] }],
          [{ align: [] }],
          [{ list: 'ordered' }, { list: 'bullet' }, { indent: '-1' }, { indent: '+1' }],
          ['blockquote', 'code-block'],
          ['link'],
          ['clean']
        ]
      }
    });

    document.getElementById('show-more-btn').addEventListener('click', function () {
      var open = this.classList.toggle('open');
      document.querySelectorAll('.extra-field').forEach(function (el) {
        el.style.display = open ? 'block' : '';
      });
    });

    document.querySelector('form').addEventListener('submit', function () {
      var html = quill.root.innerHTML;
      document.getElementById('00N9M00000XXX2DUAX').value = html === '<p><br></p>' ? '' : html;
    });
  </script>
  <script src="../forms.js"></script>
</body>

</html>
