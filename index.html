<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>John I. Haas - Forms</title>
  <link rel="stylesheet" href="forms.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .selector-wrapper {
      text-align: center;
      padding: 40px 20px;
    }

    .selector-wrapper h1 {
      font-family: gelica, sans-serif;
      font-size: 42px;
      line-height: 1.1;
      color: #323E48;
      margin-bottom: 40px;
    }

    .selector-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .selector-buttons a {
      display: inline-block;
      background: #4a8b2c;
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      font-family: alternate-gothic-condensed-a, sans-serif;
      font-size: 16px;
      letter-spacing: 1px;
      padding: 12px 65px;
      border-radius: 0;
      transition: color 0.2s;
    }

    .selector-buttons a:hover {
      color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>

<body>

  <div class="selector-wrapper">
    <h1>Select your Form</h1>
    <div class="selector-buttons">
      <a href="LeadForm/index.html">Lead Form</a>
      <a href="CaseForm/index.html">Contact Us</a>
    </div>
  </div>

</body>

</html>
